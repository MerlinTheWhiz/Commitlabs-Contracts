name: Soroban Contracts CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUN_TESTNET_IT: ${{ secrets.RUN_TESTNET_IT || 'false' }}

jobs:
  build-and-test:
    name: Build and Test Soroban Contracts
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Rust setup
      # -----------------------------
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Soroban Rust targets
        run: |
          rustup target add wasm32-unknown-unknown
          rustup target add wasm32v1-none

      # -----------------------------
      # Cache (optimized)
      # -----------------------------
      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry
            ~/.cargo/git
            **/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # -----------------------------
      # Install Stellar CLI (Linux-safe)
      # -----------------------------
      - name: Install Stellar CLI
        continue-on-error: true
        run: |
          curl -L https://github.com/stellar/stellar-cli/releases/latest/download/stellar-cli-linux-amd64 -o stellar
          chmod +x stellar
          sudo mv stellar /usr/local/bin/stellar

      # -----------------------------
      # Verify CLI
      # -----------------------------
      - name: Verify Stellar CLI installation
        run: |
          if command -v stellar &> /dev/null; then
            echo "✓ Stellar CLI found"
            stellar --version
          elif command -v soroban &> /dev/null; then
            echo "✓ Soroban CLI found"
            soroban --version
          else
            echo "CLI not found — skipping CLI-based builds"
          fi

      # -----------------------------
      # Build (Cargo WASM)
      # -----------------------------
      - name: Build Rust contracts (WASM)
        run: |
          cargo build --workspace --target wasm32-unknown-unknown --release
          echo "✓ Cargo WASM build completed"

      # -----------------------------
      # Build (CLI)
      # -----------------------------
      - name: Build Soroban contracts with Stellar CLI
        run: |
          if ! command -v stellar &> /dev/null && ! command -v soroban &> /dev/null; then
            echo "Skipping CLI build (CLI not installed)"
            exit 0
          fi

          for contract in contracts/*/; do
            if [ -f "$contract/Cargo.toml" ]; then
              contract_name=$(basename "$contract")
              echo "Building $contract_name..."

              cd "$contract"

              if command -v soroban &> /dev/null; then
                soroban contract build
              else
                stellar contract build
              fi

              cd - > /dev/null
            fi
          done

          echo "✓ CLI build completed"

      # -----------------------------
      # Tests
      # -----------------------------
      - name: Run unit tests
        run: |
          cargo test --workspace
          echo "✓ Unit tests passed"

      - name: Drift check commitment interface
        run: |
          cargo test -p commitment_interface
          echo "✓ Drift checks passed"

      - name: Run integration tests
        run: |
          cd tests/integration
          cargo test
          echo "✓ Integration tests passed"

      # -----------------------------
      # Monitoring validation
      # -----------------------------
      - name: Validate monitoring config
        run: |
          chmod +x monitoring/scripts/validate_monitoring_config.sh
          monitoring/scripts/validate_monitoring_config.sh
          echo "✓ Monitoring config validated"

      # -----------------------------
      # Benchmarks
      # -----------------------------
      - name: Run performance benchmarks
        run: |
          mkdir -p benchmarks/results
          echo "Running benchmarks..."

          cargo test --workspace --features benchmark --release -- --nocapture \
            2>&1 | tee benchmarks/results/ci_benchmark_$(date +%Y%m%d_%H%M%S).log \
            || echo "Some benchmarks failed"

          echo "✓ Benchmarks completed"

      # -----------------------------
      # Verify artifacts
      # -----------------------------
      - name: Check for WASM artifacts
        run: |
          echo "Checking WASM outputs..."

          find . -name "*.wasm" | head -10 || echo "No WASM files found"

          ls -la target/wasm32-unknown-unknown/release/*.wasm 2>/dev/null || echo "No WASM in expected path"
          ls -la target/wasm32v1-none/release/*.wasm 2>/dev/null || echo "No WASM in expected path"

      # -----------------------------
      # Upload artifacts (NEW)
      # -----------------------------
      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: soroban-wasm-contracts
          path: |
            target/wasm32-unknown-unknown/release/*.wasm
            target/wasm32v1-none/release/*.wasm
          if-no-files-found: warn